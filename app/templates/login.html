{% extends "base.html" %}
{% block title %}Вход — OnCount Partners{% endblock %}

{% block anonymous %}
<div class="login-page">
  <div class="login-card">
    <img class="login-logo" src="/static/img/logo.png" alt="OnCount">
    <h1>Кабинет партнёра</h1>
    <p>Войди через Telegram — без паролей и регистраций.</p>

    <script async src="https://telegram.org/js/telegram-widget.js?22"
            data-telegram-login="{{ bot_username }}"
            data-size="large"
            data-radius="10"
            data-auth-url="{{ webapp_url }}/auth/callback"
            data-request-access="write"></script>

    <p class="login-hint">
      Нет аккаунта в Telegram? Открой <a href="https://t.me/{{ bot_username }}" target="_blank">бота @{{ bot_username }}</a>
      и нажми /start — получишь приглашение.
    </p>
  </div>
</div>
{% endblock %}
